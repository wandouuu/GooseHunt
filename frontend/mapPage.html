<!DOCTYPE html>
<html>

<head>
    <title>Hide and Seek Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="mapPage.css">
</head>

<body>
    <div id="map"></div>

    <div id="ui-overlay">
        <div id="timer">Time Left: 60:00</div>

        <div id="role-box">
            Role: <span id="player-role">Hider</span>
        </div>

        <button id="caught-btn">I've Been Caught</button>

        <div id="hiders-left">
            Hiders Remaining: <span id="hider-count">5</span>
        </div>

        <div id="game-id-box">
            Game Id: <span id=game-id>000000</span>
        </div>

        <button id="start-game-btn">Start Game</button>
    </div>


    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="mapPage.js"></script>

</body>

</html>
