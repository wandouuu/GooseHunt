<!DOCTYPE html>
<html>
    <head>
        <title>Main-Lobby : Goose_Hunt</title>
        <link rel="stylesheet" href="Lobby.css">
        <!--<link rel="icon" type="image/png" class="game-logo">-->
    </head>
    <body>
        <nav>
            <button class="btns">🗺️MAP</button>
            <button class="btns">RULES</div>
        </nav>

        <div class="Profile">
            <div class="profile-upload">
                <label for="image-input">
                    <div id="display-image">
                        <span class="upload-text">CHOOSE AVATAR</span>
                    </div>
                </label>
                
                <input type="file" id="image-input" accept="image/*" style="display: none;">
            </div>

            <div class="name-input">
                <input type="text" placeholder="ENTER PLAYER NAME" id="player-name" >            
            </div>

            <div class="game-btn">
                <button class="first-btn" id="create-game">CREATE GAME</button>
                <button class="second-btn" id="join-game">JOIN BUTTON</button>
            </div>
        </div>

        <!--POP UP WINDOW THAT OPENS AFTER THE JOIN BUTTON HAS BEEN CLICKED-->

        <div class="Join-pop-up" id="join-pop-up">
            <div class="pop-up-contents">
                <h2>ENTER THE LOBBY</h2>
                <input type="text" id="join-id" >
                <div class="pop-up-window">
                    <button class="first-btn" id="confirm-join">CONFIRM JOIN</button>
                    <button class="cancel-btn" id="cancel">CANCEL</button>
                </div>
            </div>
        </div>

        <footer style="position: fixed; bottom: 0; width: 100%; background: #678192; color: white; text-align: center; padding: 10px; font-family: fantasy;">
            RULES: 1. Find the Goose. 2. Don't be the Goose. 3. Win the game.
        </footer>

        <!--<div class="Alternate">
            <input type="file" id="file-picker"  style="display: none;">
            
            <button id="upload-btn">Upload Profile Picture</button>
            
            <div class="preview container">
                <img id="profile-preview" src="https://i.etsystatic.com/49980402/r/il/297a6d/5711116142/il_fullxfull.5711116142_b3wp.jpg" alt="Profile Preview">
            </div>
        </div>-->

        <script src="Lobby.js"></script>

    </body>
</html>
