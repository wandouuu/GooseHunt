        <title>Main-Lobby : Goose_Hunt</title>

    <body>
        <!--<img src="goosehunt2.png" alt="Goose Hunt" class="game-title">-->

        <nav>
            <button class="btns" id="rulez">RULES</div>
        </nav>

        <button class="Rule-pop-up" id="list-of-rules">
            <div class="rules">  
                <h3>RULES</h3>

                <ol type="I">
                    <li>Hide from the Seeker</li>
                    <li>All Seekers wear a headband</li>
                    <li>Players turn into Seekers once caught</li>
                    <li>Be the last Hider to win</li>
                </ol>

            </div>
        </button>

        <div class="Profile">
            <!--<div class="profile-upload">
                <label for="image-input">
                    <div id="display-image">

                <input type="file" id="image-input" accept="image/*" style="display: none;">
            </div>-->

            <img class="game-icon" src="Gemini_Generated_Image_e43029e43029e430.png" alt="Goose Hunt - A University of Waterloo Game">

            <div class="name-input">
                <input type="text" placeholder="ENTER PLAYER NAME" id="player-name" >            
            </div>

            <div class="game-btn">
                <button class="first-btn" id="create-game">CREATE GAME</button>
                <button class="second-btn" id="join-game">JOIN BUTTON</button>
            </div>
        </div>

        <!--POP UP WINDOW THAT OPENS AFTER THE JOIN BUTTON HAS BEEN CLICKED-->

        <div class="Join-pop-up" id="join-pop-up">
            <div class="pop-up-contents">
                <h2>ENTER THE LOBBY ID</h2>
                <input type="text" id="join-id" >
                <div class="pop-up-window">
                    <button class="first-btn" id="confirm-join">CONFIRM JOIN</button>
                    <button class="cancel-btn" id="cancel">CANCEL</button>
                </div>
            </div>
        </div>
